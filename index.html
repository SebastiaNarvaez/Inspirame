<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspírame</title>
    <style>
        /* Estilos generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: url(Imagenes/hola2.png);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        /* Estilo para el header */
        header {
            background-color: rgba(0, 123, 255, 0.7);
            color: white;
            width: 100%;
            padding: 1.2rem;
            font-size: 1.2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        header a:hover {
            color: #ffcc00;
        }

        /* Estilo para las secciones de formulario */
        .form-section {
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-section h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .form-section input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.2rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1.1rem;
            background-color: #f8f8f8;
            color: #333;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-section input:focus {
            border-color: #007BFF;
            outline: none;
        }

        .form-section button {
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }

        .form-section button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .form-section button:active {
            background-color: #004085;
        }

        .links {
            margin-top: 1.5rem;
            font-size: 1rem;
        }

        .links a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #ffcc00;
        }

        /* Secciones ocultas */
        section {
            display: none;
        }

        section.active {
            display: block;
        }

    </style>
</head>
<body>
    <header>
        <a href="#" onclick="showSection('login-section')">Inicio de Sesión</a>
        <a href="#" onclick="showSection('register-section')">Crear Cuenta</a>
        <a href="#" onclick="showSection('forgot-password-section')">Recuperar Contraseña</a>
    </header>

    <!-- Sección de inicio de sesión -->
    <section id="login-section" class="active">
        <div class="form-section">
            <h2>Inicio de Sesión</h2>
            <form id="login-form" onsubmit="handleLoginSubmit(event)">
                <input type="email" name="email" placeholder="Correo electrónico" required>
                <input type="password" name="password" placeholder="Contraseña" required>
                <button type="submit">Iniciar Sesión</button>
            </form>
            <div class="links">
                <a href="#" onclick="showSection('register-section')">Crear cuenta</a>
                <a href="#" onclick="showSection('forgot-password-section')">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </section>

    <!-- Sección de crear cuenta -->
    <section id="register-section">
        <div class="form-section">
            <h2>¡Vamos, crea tu cuenta!</h2>
            <form id="register-form" onsubmit="handleRegisterSubmit(event)">
                <input type="email" name="email" placeholder="Correo electrónico" required>
                <input type="password" name="password" placeholder="Contraseña" required>
                <input type="password" name="confirm-password" placeholder="Repetir contraseña" required>
                <button type="submit">Crear Cuenta</button>
            </form>
            <div class="links">
                <a href="#" onclick="showSection('login-section')">Volver al inicio de sesión</a>
            </div>
            <div id="success-message" class="success-message" style="display: none;">
                Tu cuenta fue creada con éxito. Redirigiendo al inicio de sesión...
            </div>
        </div>
    </section>

    <!-- Sección de recuperación de contraseña -->
    <section id="forgot-password-section">
        <div class="form-section">
            <h2>Recuperar Contraseña</h2>
            <form id="email-form" onsubmit="handleEmailSubmit(event)">
                <input type="email" name="email" placeholder="Ingresa tu correo electrónico" required>
                <button type="submit">Enviar Código de Verificación</button>
            </form>
            <form id="code-form" style="display: none;" onsubmit="handleCodeSubmit(event)">
                <input type="text" name="verification-code" placeholder="Ingresa el código de verificación" required>
                <button type="submit">Verificar Código</button>
            </form>
            <form id="change-password-form" style="display: none;" onsubmit="handleChangePassword(event)">
                <input type="password" name="new-password" placeholder="Nueva Contraseña" required>
                <input type="password" name="confirm-new-password" placeholder="Confirmar Nueva Contraseña" required>
                <button type="submit">Cambiar Contraseña</button>
            </form>
            <div class="links">
                <a href="#" onclick="showSection('login-section')">Volver al inicio de sesión</a>
                <a href="#" onclick="resetRecoveryProcess()">Recuperar otra vez</a>
            </div>
        </div>
    </section>

    <script>
        // Función para cambiar entre secciones
        function showSection(sectionId) {
            document.querySelectorAll('section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
        }

        // Función para manejar el envío del formulario de inicio de sesión
        function handleLoginSubmit(event) {
            event.preventDefault(); // Evita el envío del formulario
            window.location.href = "dashboard.html"; // Redirige a la página dashboard.html
        }

        // Función para manejar el envío del formulario de crear cuenta
        function handleRegisterSubmit(event) {
            event.preventDefault();
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';

            // Después de 3 segundos, redirigir al inicio de sesión
            setTimeout(function() {
                showSection('login-section');
                resetRegisterForm();
            }, 3000);
        }

        // Función para reiniciar el formulario de creación de cuenta
        function resetRegisterForm() {
            document.getElementById('register-form').reset(); // Limpia los campos del formulario
            document.getElementById('success-message').style.display = 'none'; // Oculta el mensaje de éxito
        }

        // Maneja el envío del formulario de correo
        function handleEmailSubmit(event) {
            event.preventDefault();
            document.getElementById('email-form').style.display = 'none';
            document.getElementById('code-form').style.display = 'block';
            alert('Se ha enviado un código de verificación a tu correo electrónico.');
        }

        // Maneja el envío del formulario de código
        function handleCodeSubmit(event) {
            event.preventDefault();
            document.getElementById('code-form').style.display = 'none';
            document.getElementById('change-password-form').style.display = 'block';
            alert('Código verificado. Ahora puedes proceder a cambiar tu contraseña.');
        }

        // Maneja el envío del formulario de cambio de contraseña
        function handleChangePassword(event) {
            event.preventDefault();
            alert('Contraseña cambiada con éxito.');
            showSection('login-section');
        }

        // Función para restablecer el proceso de recuperación de contraseña
        function resetRecoveryProcess() {
            showSection('forgot-password-section');
            document.getElementById('email-form').style.display = 'block';
            document.getElementById('code-form').style.display = 'none';
            document.getElementById('change-password-form').style.display = 'none';
        }
    </script>
</body>
</html>
